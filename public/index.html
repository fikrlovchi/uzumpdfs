<!doctype html>
<html lang="uz">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Uzum PDF Dashboard</title>
<link rel="icon" type="image/svg+xml" href="/logo.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700&display=swap" rel="stylesheet">
<style>
  :root { color-scheme: light dark; --bg:#0f172a; --card:#1e293b; --line:#334155;
    --txt:#e2e8f0; --mut:#94a3b8; --accent:#38bdf8; --accent2:#2ecc8f;
    --grad:linear-gradient(135deg,#2ecc8f,#38bdf8); }
  * { box-sizing:border-box; }
  body { margin:0; font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
    background:var(--bg); color:var(--txt); }
  header { display:flex; align-items:center; justify-content:space-between;
    padding:14px 20px; border-bottom:1px solid var(--line);
    background:linear-gradient(180deg, rgba(46,204,143,.05), transparent); }
  header .brand { display:flex; align-items:center; gap:10px; }
  header .brand img { width:28px; height:28px; display:block; }
  header h1 { font-size:17px; margin:0; font-family:"Montserrat",system-ui,sans-serif; }
  header a { color:var(--mut); font-size:13px; text-decoration:none; }
  .wrap { max-width:1200px; margin:0 auto; padding:20px; }
  .panel { background:var(--card); border:1px solid var(--line); border-radius:14px; padding:18px; margin-bottom:18px; }
  label { font-size:13px; color:var(--mut); display:block; margin-bottom:6px; }
  textarea { width:100%; height:150px; resize:vertical; padding:12px; border-radius:10px;
    border:1px solid var(--line); background:var(--bg); color:var(--txt);
    font-family:ui-monospace,Menlo,Consolas,monospace; font-size:13px; }
  .count { font-size:12px; color:var(--mut); margin-top:8px; }
  button.run { width:100%; margin-top:14px; padding:13px; border:0; border-radius:10px; color:#0f172a;
    font-size:15px; font-weight:700; cursor:pointer; background:var(--grad); }
  button.run:hover { filter:brightness(1.08); }
  button.run:disabled { opacity:.5; cursor:not-allowed; }
  details { margin-top:14px; border:1px solid var(--line); border-radius:10px; padding:10px 14px; }
  summary { cursor:pointer; font-size:14px; color:var(--txt); }
  .grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(140px,1fr)); gap:10px 14px; margin-top:14px; }
  .grid label { margin-bottom:3px; }
  .grid input, .grid select { width:100%; padding:8px 10px; border-radius:8px; border:1px solid var(--line);
    background:var(--bg); color:var(--txt); font-size:13px; }
  .results { display:grid; grid-template-columns:1fr 1fr; gap:18px; }
  @media (max-width:820px){ .results{ grid-template-columns:1fr; } }
  .pane h3 { margin:0 0 10px; font-size:15px; }
  .status { font-size:13px; min-height:20px; margin-bottom:10px; }
  .spin { display:inline-block; width:13px; height:13px; border:2px solid var(--mut);
    border-top-color:transparent; border-radius:50%; animation:s .7s linear infinite; vertical-align:-2px; margin-right:7px; }
  @keyframes s { to{ transform:rotate(360deg); } }
  .ok { color:#4ade80; } .bad { color:#f87171; } .wait { color:var(--mut); }
  .pane a { color:#818cf8; font-size:13px; }
  iframe { width:100%; height:440px; border:1px solid var(--line); border-radius:10px; margin-top:10px; background:#fff; }
  table { width:100%; border-collapse:collapse; font-size:13px; }
  th, td { text-align:left; padding:9px 10px; border-bottom:1px solid var(--line); }
  th { color:var(--mut); font-weight:600; }
  td a { color:#818cf8; text-decoration:none; }
  .muted { color:var(--mut); }
</style>
</head>
<body>
  <header>
    <div class="brand"><img src="/logo.svg" alt=""><h1>Uzum PDF Dashboard</h1></div>
    <a href="/logout">Chiqish</a>
  </header>
  <div class="wrap">
    <div class="panel">
      <label>Order ID'lar (har qatorda bitta yoki vergul bilan)</label>
      <textarea id="orders" placeholder="116649323&#10;116735910&#10;108424143 ..."></textarea>
      <div class="count" id="count">0 ta order</div>

      <details>
        <summary>⚙️ PDF konstruktor (ShK yorliqlari)</summary>
        <div class="grid">
          <div><label>Qog'oz kengligi</label><input type="number" id="pw" value="594"></div>
          <div><label>Qog'oz balandligi</label><input type="number" id="ph" value="420"></div>
          <div><label>Orientatsiya</label><select id="ori"><option value="portrait">portrait</option><option value="landscape">landscape</option></select></div>
          <div><label>QR o'lchami</label><input type="number" id="qr" value="360"></div>
          <div><label>QR X</label><input type="number" id="qx" value="90"></div>
          <div><label>QR Y</label><input type="number" id="qy" value="40"></div>
          <div><label>Matn (yuqori)</label><input type="number" id="tt" value="24"></div>
          <div><label>Matn (past)</label><input type="number" id="tb" value="50"></div>
          <div><label>Title X <span class="muted">(ixt.)</span></label><input type="number" id="tx" placeholder="auto"></div>
          <div><label>Title Y <span class="muted">(ixt.)</span></label><input type="number" id="ty" placeholder="auto"></div>
          <div><label>Barcode X <span class="muted">(ixt.)</span></label><input type="number" id="bx" placeholder="auto"></div>
          <div><label>Barcode Y <span class="muted">(ixt.)</span></label><input type="number" id="by" placeholder="auto"></div>
        </div>
        <div style="margin-top:14px;">
          <label>Preview (namuna yorliq) <span class="count" id="previewStatus"></span></label>
          <iframe id="previewFrame" style="height:380px;"></iframe>
        </div>
      </details>

      <button class="run" id="runBtn" onclick="process()">Ishga tushirish (ShK + BIG)</button>
    </div>

    <div class="panel">
      <div class="results">
        <div class="pane">
          <h3>🏷️ ShK (yorliqlar)</h3>
          <div class="status wait" id="shkStatus">—</div>
          <div id="shkResult"></div>
        </div>
        <div class="pane">
          <h3>📄 BIG (Uzum label)</h3>
          <div class="status wait" id="bigStatus">—</div>
          <div id="bigResult"></div>
        </div>
      </div>
    </div>

    <div class="panel">
      <label>Tarix</label>
      <table>
        <thead><tr><th>Sana / vaqt</th><th>Order</th><th>ShK</th><th>BIG</th></tr></thead>
        <tbody id="histBody"><tr><td colspan="4" class="muted">Yuklanmoqda...</td></tr></tbody>
      </table>
    </div>
  </div>

<script>
  const $ = id => document.getElementById(id);
  const ordersEl = $('orders');
  const parseIds = t => t.split(/[\s,]+/).map(s=>s.trim()).filter(Boolean);
  ordersEl.addEventListener('input', () => $('count').textContent = parseIds(ordersEl.value).length + ' ta order');

  const num = id => { const v = $(id).value.trim(); return v==='' ? null : Number(v); };
  function buildConfig(){
    const cfg = {
      orientation: $('ori').value,
      qrSize: num('qr'),
      pageSize: { width: num('pw'), height: num('ph') },
      textSize: { top: num('tt'), bottom: num('tb') },
      qrPosition: { x: num('qx'), y: num('qy') },
    };
    const tx=num('tx'), ty=num('ty'); if(tx!==null||ty!==null) cfg.titlePosition={x:tx,y:ty};
    const bx=num('bx'), by=num('by'); if(bx!==null||by!==null) cfg.barcodePosition={x:bx,y:by};
    return cfg;
  }

  // Har panel oxirgi holatini eslab qolamiz — o'zgarmagan bo'lsa QAYTA CHIZMAYMIZ
  // (aks holda ShK iframe har polling'da qayta yuklanib "oqarib" ketardi).
  let rendered = { shk:'', big:'' };
  function renderPane(kind, s){
    const sig = !s || s.status==='pending' ? 'pending'
      : s.status==='error' ? 'error:'+(s.error||'?')
      : 'done:'+s.url;
    if(rendered[kind] === sig) return;   // o'zgarish yo'q — tegmaymiz
    rendered[kind] = sig;

    const statusEl = $(kind+'Status'), resEl = $(kind+'Result');
    if(sig === 'pending'){ statusEl.className='status wait'; statusEl.innerHTML='<span class="spin"></span>Kutilmoqda...'; return; }
    if(s.status==='error'){ statusEl.className='status bad'; statusEl.textContent='Xato: '+(s.error||'?'); resEl.innerHTML=''; return; }
    // done
    const info = kind==='shk' ? `${s.orders} order → ${s.pages} bet`
      : `${s.orders} order → ${s.merged} fayl${s.skipped?` (skip ${s.skipped})`:''}`;
    statusEl.className='status ok'; statusEl.innerHTML='✓ Tayyor — '+info;
    resEl.innerHTML = '<a href="'+s.url+'" target="_blank">'+s.fileName+' ⬇</a><iframe src="'+s.url+'"></iframe>';
  }

  let poller = null;
  async function process(){
    const ids = parseIds(ordersEl.value);
    if(!ids.length){ $('shkStatus').className='status bad'; $('shkStatus').textContent='Order ID kiriting'; return; }
    $('runBtn').disabled = true;
    $('shkResult').innerHTML=''; $('bigResult').innerHTML='';
    rendered = { shk:'', big:'' };
    renderPane('shk', null); renderPane('big', null);
    try{
      const r = await fetch('/process', { method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ orderIds: ids, pdfConfig: buildConfig() }) });
      if(r.status===401){ location.href='/login'; return; }
      const { batchId, message } = await r.json();
      if(!batchId) throw new Error(message||'Server xatosi');
      pollBatch(batchId);
    }catch(e){ $('shkStatus').className='status bad'; $('shkStatus').textContent='Xato: '+e.message; $('runBtn').disabled=false; }
  }

  async function pollBatch(batchId){
    const r = await fetch('/batch/'+batchId);
    if(r.status===401){ location.href='/login'; return; }
    const b = await r.json();
    renderPane('shk', b.shk);
    renderPane('big', b.big);
    const running = b.shk?.status==='pending' || b.big?.status==='pending';
    if(running){ poller = setTimeout(()=>pollBatch(batchId), 1500); }
    else { $('runBtn').disabled=false; loadHistory(); }
  }

  async function loadHistory(){
    try{
      const r = await fetch('/history');
      if(r.status===401){ location.href='/login'; return; }
      const h = await r.json();
      const link = f => f && f.url ? '<a href="'+f.url+'" target="_blank">'+f.fileName+'</a>' : '<span class="muted">—</span>';
      $('histBody').innerHTML = h.length
        ? h.map(e=>`<tr><td>${new Date(e.date).toLocaleString('uz')}</td><td>${e.orders}</td><td>${link(e.shk)}</td><td>${link(e.big)}</td></tr>`).join('')
        : '<tr><td colspan="4" class="muted">Hali tarix yo\'q</td></tr>';
    }catch(e){ $('histBody').innerHTML='<tr><td colspan="4" class="bad">Tarix yuklanmadi</td></tr>'; }
  }
  // ---- Konstruktor jonli preview ----
  let previewUrl = null, previewTimer = null;
  async function doPreview(){
    const st = $('previewStatus'); st.textContent = ' — yangilanmoqda...';
    try{
      const r = await fetch('/preview', { method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ pdfConfig: buildConfig() }) });
      if(r.status===401){ location.href='/login'; return; }
      if(!r.ok){ const j = await r.json().catch(()=>({})); throw new Error(j.message||('HTTP '+r.status)); }
      const blob = await r.blob();
      if(previewUrl) URL.revokeObjectURL(previewUrl);
      previewUrl = URL.createObjectURL(blob);
      $('previewFrame').src = previewUrl;
      st.textContent = '';
    }catch(e){ st.textContent = ' — xato: '+e.message; }
  }
  // konstruktor qiymatlari localStorage'da saqlanadi (sahifa yangilansa ham qoladi)
  const CFG_KEYS = ['pw','ph','ori','qr','qx','qy','tt','tb','tx','ty','bx','by'];
  function saveCfg(){ const o={}; CFG_KEYS.forEach(k=>o[k]=$(k).value); localStorage.setItem('uzumPdfCfg', JSON.stringify(o)); }
  function loadCfg(){ try{ const o=JSON.parse(localStorage.getItem('uzumPdfCfg')||'{}'); CFG_KEYS.forEach(k=>{ if(o[k]!==undefined) $(k).value=o[k]; }); }catch{} }
  loadCfg();

  const schedulePreview = () => { clearTimeout(previewTimer); previewTimer = setTimeout(doPreview, 400); };
  CFG_KEYS.forEach(id=>{
    $(id).addEventListener('input', ()=>{ saveCfg(); schedulePreview(); });
    $(id).addEventListener('change', ()=>{ saveCfg(); schedulePreview(); });
  });
  // konstruktor birinchi ochilganda preview yuklanadi
  document.querySelector('details').addEventListener('toggle', e => { if(e.target.open && !previewUrl) doPreview(); });

  loadHistory();
</script>
</body>
</html>
